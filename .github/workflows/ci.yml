name: CI Retraining Workflow

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  retrain-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn dagshub docker

      - name: Run MLProject Retraining
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          if [ -z "${{ secrets.DAGSHUB_USERNAME }}" ]; then
            echo "DagsHub secrets not configured. Running MLProject with local MLflow tracking..."
            export MLFLOW_TRACKING_URI="file://${{ github.workspace }}/mlruns"
          else
            echo "DagsHub secrets found. Logging to DagsHub..."
            export MLFLOW_TRACKING_URI="https://dagshub.com/akubima/Eksperimen_SML_Bima-Mukhlisin-Bil-Sajjad.mlflow"
          fi
          mlflow run MLProject --env-manager local -P n_estimators=120 -P max_depth=6

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          if [ -z "${{ secrets.DAGSHUB_USERNAME }}" ]; then
            export MLFLOW_TRACKING_URI="file://${{ github.workspace }}/mlruns"
            EXP_NAME="CI_Retraining"
          else
            export MLFLOW_TRACKING_URI="https://dagshub.com/akubima/Eksperimen_SML_Bima-Mukhlisin-Bil-Sajjad.mlflow"
            EXP_NAME="CI_Retraining"
          fi
          # Fetch the latest run ID
          RUN_ID=$(python -c "import mlflow; mlflow.set_tracking_uri('$MLFLOW_TRACKING_URI'); runs = mlflow.search_runs(experiment_names=['$EXP_NAME'], order_by=['attribute.start_time DESC'], max_results=1); print(runs.iloc[0]['run_id']) if not runs.empty else None")
          echo "Building docker image for Run ID: $RUN_ID"
          
          # Build Docker image using mlflow models build-docker
          mlflow models build-docker -m "runs:/$RUN_ID/model" -n "bima101/heart-disease-model:latest" --enable-mlserver
          
          # Push to Docker Hub (if docker credentials are set)
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
            docker push bima101/heart-disease-model:latest
          else
            echo "Docker Hub credentials not configured. Skipping docker push."
          fi
