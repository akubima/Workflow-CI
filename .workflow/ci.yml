name: CI Retraining Workflow

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  retrain-and-deploy:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_EXPERIMENT_NAME: CI_Retraining
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn dagshub docker

      - name: Verify MLflow Tracking Target
        run: |
          STATUS=$(python -c "
import mlflow
import os
try:
    mlflow.set_tracking_uri('https://dagshub.com/akubima/Eksperimen_SML_Bima-Mukhlisin-Bil-Sajjad.mlflow')
    client = mlflow.tracking.MlflowClient()
    run = client.create_run(experiment_id='0', tags={'test': 'connection'})
    client.delete_run(run.info.run_id)
    print('SUCCESS')
except Exception as e:
    print('FAILED')
")
          if [ "$STATUS" = "SUCCESS" ]; then
            echo "DagsHub connection verified successfully. Logging to DagsHub..."
            echo "MLFLOW_TRACKING_URI=https://dagshub.com/akubima/Eksperimen_SML_Bima-Mukhlisin-Bil-Sajjad.mlflow" >> $GITHUB_ENV
          else
            echo "DagsHub connection verification failed. Falling back to local MLflow tracking..."
            echo "MLFLOW_TRACKING_URI=file://${{ github.workspace }}/mlruns" >> $GITHUB_ENV
            echo "SKIP_DAGSHUB=1" >> $GITHUB_ENV
          fi

      - name: Run MLProject Retraining
        run: |
          mlflow run MLProject --env-manager local -P n_estimators=120 -P max_depth=6

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          RUN_ID=$(python -c "import mlflow; import os; mlflow.set_tracking_uri(os.environ['MLFLOW_TRACKING_URI']); runs = mlflow.search_runs(experiment_names=[os.environ['MLFLOW_EXPERIMENT_NAME']], order_by=['attribute.start_time DESC'], max_results=1); print(runs.iloc[0]['run_id']) if not runs.empty else None")
          echo "Building docker image for Run ID: $RUN_ID"
          mlflow models build-docker -m "runs:/$RUN_ID/model" -n "bima101/heart-disease-model:latest" --enable-mlserver
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
            docker push bima101/heart-disease-model:latest
          else
            echo "Docker Hub credentials not configured. Skipping docker push."
          fi
